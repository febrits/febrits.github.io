name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Add verification files to dist
        run: |
          echo "google-site-verification: googlef13c538fc2b7c0cf" > dist/googlef13c538fc2b7c0cf.html
          touch dist/.nojekyll
          # Add meta verification to index.html head
          sed -i 's|</head>|<meta name="google-site-verification" content="pAeS9H2MKn0ZdZEW5w3n5CS8249ddLuO2y-SYghHhFk" />\n</head>|' dist/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
